name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Runs the same hook set as local git hooks (single source: devenv.nix):
  # default stage (lint/format/hygiene) + pre-push stage (tests, pio check),
  # plus commit-message lint over the PR range.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-lint-${{ runner.os }}-${{ hashFiles('firmware/pio/platformio.ini') }}
          # Warm-start from the test/build jobs' PlatformIO caches.
          restore-keys: |
            pio-esp32-${{ runner.os }}-
            pio-native-${{ runner.os }}-
      - name: install devenv.sh
        run: nix profile install nixpkgs#devenv
      # On a fresh runner store, devenv evaluation intermittently fails with
      # "path '...-builder.sh' is not valid" (upstream, unresolved:
      # https://github.com/cachix/devenv/issues/2729). Retry, removing the
      # orphaned store path between attempts so the re-add can succeed.
      - name: build shell (retries devenv#2729)
        run: |
          for i in 1 2 3; do
            out=$(devenv shell -- true 2>&1) && exit 0
            echo "attempt $i failed"
            printf '%s\n' "$out" | tail -20
            bad=$(printf '%s\n' "$out" | grep -oE "/nix/store/[a-z0-9]{32}-[^']*' is not valid" | sed "s/' is not valid//" | head -1)
            if [ -n "$bad" ]; then
              echo "removing invalid store path: $bad"
              sudo rm -rf "$bad" || true
            fi
            sleep 2
          done
          echo "devenv shell failed after 3 attempts"
          exit 1
      - name: run all hooks on all files
        run: devenv test
      - name: gitlint over PR commits
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: devenv shell -- gitlint --commits "origin/${BASE_REF}..HEAD"
      # Direct pushes to main bypass the PR range check (and possibly local
      # hooks via --no-verify); lint the pushed range instead.
      - name: gitlint over pushed commits
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          RANGE: ${{ github.event.before }}..${{ github.event.after }}
        run: devenv shell -- gitlint --commits "$RANGE"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest tools/

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: run web-debug tests
        working-directory: web-debug
        run: node --test
      - name: syntax-check app.js (browser-only module, not imported by tests)
        working-directory: web-debug
        run: node --check app.js

  firmware-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('firmware/pio/platformio.ini') }}
      - run: pip install platformio
      - run: pio test -e native -d firmware/pio

# The ESP32 builds live in firmware-build.yml and run only
# when firmware sources change.
