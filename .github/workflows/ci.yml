name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Runs the same hook set as local git hooks (single source: devenv.nix):
  # default stage (lint/format/hygiene) + pre-push stage (tests, pio check),
  # plus commit-message lint over the PR range.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        with:
          name: devenv
      # Persist the evaluated devenv closure between runs; the devenv cachix
      # cache only covers devenv itself, not this project's toolchain.
      - uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('devenv.lock', 'devenv.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-lint-${{ runner.os }}-${{ hashFiles('firmware/pio/platformio.ini') }}
          # Warm-start from the test/build jobs' PlatformIO caches.
          restore-keys: |
            pio-esp32-${{ runner.os }}-
            pio-native-${{ runner.os }}-
      - name: install devenv.sh
        run: nix profile install nixpkgs#devenv
      - name: run all hooks on all files
        run: devenv test
      - name: gitlint over PR commits
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: devenv shell -- gitlint --commits "origin/${BASE_REF}..HEAD"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pytest tools/

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: run web-debug tests
        working-directory: web-debug
        run: node --test
      - name: syntax-check app.js (browser-only module, not imported by tests)
        working-directory: web-debug
        run: node --check app.js

  firmware-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-native-${{ runner.os }}-${{ hashFiles('firmware/pio/platformio.ini') }}
      - run: pip install platformio
      - run: pio test -e native -d firmware/pio

  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-esp32-${{ runner.os }}-${{ hashFiles('firmware/pio/platformio.ini') }}
      - run: pip install platformio
      - run: pio run -e m5atom_lite -e m5stick_c -e m5stack_atoms3 -e generic_esp32_gpio -d firmware/pio
