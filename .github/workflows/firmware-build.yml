name: firmware-build

# The 4-env ESP32 build takes ~3 minutes; run it only when firmware sources
# (or this workflow) change. Host-runnable checks stay in ci.yml.
on:
  push:
    branches: [main]
    paths:
      - "firmware/pio/**"
      - "tools/prepare_web_flasher.py"
      - "web-flasher/**"
      - ".github/workflows/firmware-build.yml"
  pull_request:
    paths:
      - "firmware/pio/**"
      - "tools/prepare_web_flasher.py"
      - "web-flasher/**"
      - ".github/workflows/firmware-build.yml"

jobs:
  firmware-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-esp32-${{ runner.os }}-${{ hashFiles('firmware/pio/platformio.ini') }}
      - run: pip install platformio
      - run: pio run -e m5atom_lite -e m5stick_c -e m5stack_atoms3 -e generic_esp32_gpio -d firmware/pio
      - run: python3 tools/prepare_web_flasher.py --env m5stick_c --tag ci --output-dir build/web-flasher/m5stick_c
