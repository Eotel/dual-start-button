; Dual Start Button firmware
; Build examples:
;   pio run -e m5atom_lite
;   pio run -e m5stick_c
;   pio run -e m5stack_atoms3
;   pio run -e generic_esp32_gpio
; Host-side protocol tests (no device toolchain required):
;   pio test -e native

[platformio]
default_envs = m5atom_lite

; Static analysis (pio check) covers our sources only. Vendored libraries
; (.pio/libdeps: M5GFX etc.) are not ours to fix, and cppcheck defects raised
; inside their headers (included from our translation units) are suppressed.
[env]
check_skip_packages = yes
check_src_filters =
  +<src/>
  +<include/>
  +<test/>
check_flags =
  cppcheck: --suppress=*:*libdeps*

; Shared ESP32 device configuration. The four device envs extend this.
; The native test env deliberately does NOT inherit it, so it stays free of
; the Arduino framework, M5Unified, and NimBLE.
[esp32_base]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
lib_ldf_mode = deep
build_src_filter =
  +<*>
  -<main_hid.cpp>
lib_deps =
  m5stack/M5Unified@^0.2.16
  h2zero/NimBLE-Arduino@^2.5.0
build_flags =
  -D DSB_FW_VERSION=\"0.1.0\"
  -D DSB_HEARTBEAT_MS=1000
  -D DSB_DEBOUNCE_MS=30
  -D DSB_LONG_HOLD_RESET_MS=10000
; Static analysis (pio check): analyze only this repo's sources. Findings
; attributed to vendored libraries under .pio/ (e.g. cppcheck preprocessor
; limits in M5GFX headers) are not ours to fix.
check_skip_packages = yes
check_flags =
  cppcheck: --suppress=*:.pio/* --suppress=*:*/.pio/*

[env:m5atom_lite]
extends = esp32_base
board = m5stack-atom
build_flags =
  ${esp32_base.build_flags}
  -D DSB_TARGET_NAME=\"m5atom_lite\"
  -D DSB_BUTTON_SOURCE=0

[env:m5stick_c]
extends = esp32_base
; PlatformIO currently uses m5stick-c for M5StickC and many M5StickC Plus sketches.
board = m5stick-c
build_flags =
  ${esp32_base.build_flags}
  -D DSB_TARGET_NAME=\"m5stick_c\"
  -D DSB_BUTTON_SOURCE=0

[env:m5stick_c_hid]
extends = esp32_base
; HID fallback build for M5StickC / M5StickC Plus. GATT remains canonical.
board = m5stick-c
build_src_filter =
  +<*>
  -<main.cpp>
build_flags =
  ${esp32_base.build_flags}
  -D DSB_TARGET_NAME=\"m5stick_c_hid\"
  -D DSB_BUTTON_SOURCE=0
  -D DSB_HID_FALLBACK=1

[env:m5stack_atoms3]
extends = esp32_base
board = m5stack-atoms3
build_flags =
  ${esp32_base.build_flags}
  -D DSB_TARGET_NAME=\"m5stack_atoms3\"
  -D DSB_BUTTON_SOURCE=0

[env:generic_esp32_gpio]
extends = esp32_base
board = esp32dev
build_flags =
  ${esp32_base.build_flags}
  -D DSB_TARGET_NAME=\"generic_esp32_gpio\"
  -D DSB_BUTTON_SOURCE=4
  -D DSB_BUTTON_GPIO=39
  -D DSB_BUTTON_ACTIVE_LEVEL=0

; Host-native protocol unit tests (Unity). Compiles protocol.h and
; link_control.h against the shared JSON vectors in ../../test-vectors,
; with zero device dependencies.
[env:native]
platform = native
test_framework = unity
build_flags =
  -std=c++17
extra_scripts = pre:generate_test_vectors.py
